name: Promote latest Vercel deploy to artimagehub.com

# Vercel's native deploy is configured to NOT auto-alias to the production
# domain (discovered 2026-04-17 after 3 days of stale prod). This workflow
# fills that gap by explicitly aliasing the Ready production deploy for the
# pushed commit to artimagehub.com after every push to main.
#
# Inert until secrets are configured. Set in GitHub → Settings → Secrets:
#   VERCEL_TOKEN       (https://vercel.com/account/tokens — any scope)
#   VERCEL_ORG_ID      (team_rayvwE5FJJR5JAkR4TpNKRuE)
#   VERCEL_PROJECT_ID  (prj_wcr5gRwNAkNrVcfPBYE4Pk4SQz24)

on:
  push:
    branches: [main]
  workflow_dispatch:

# Only the latest push to main matters — cancel older alias jobs.
concurrency:
  group: vercel-auto-alias
  cancel-in-progress: true

jobs:
  promote:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Alias Ready production deploy for this commit to artimagehub.com
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "::notice title=Inert::VERCEL_TOKEN secret not set."
            echo "To enable: Settings → Secrets and variables → Actions →"
            echo "  add VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID"
            exit 0
          fi

          if [ -z "$VERCEL_ORG_ID" ] || [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "::error title=Missing Vercel secrets::VERCEL_ORG_ID and VERCEL_PROJECT_ID are required."
            exit 1
          fi

          echo "Waiting for Vercel production deploy for commit ${GITHUB_SHA}..."

          # Poll up to 20 min. Use the Vercel API instead of parsing `vercel ls`
          # table output; GitHub Actions has no linked project directory and the
          # CLI table format has changed before.
          for i in $(seq 1 80); do
            DEPLOY_URL=$(curl -fsS \
              -H "Authorization: Bearer ${VERCEL_TOKEN}" \
              "https://api.vercel.com/v6/deployments?teamId=${VERCEL_ORG_ID}&projectId=${VERCEL_PROJECT_ID}&target=production&limit=20" \
              | jq -r --arg sha "$GITHUB_SHA" '
                  .deployments[]
                  | select(.state == "READY")
                  | select(.meta.githubCommitSha == $sha or .meta.githubCommitSha == ($sha[0:7]))
                  | "https://" + .url
                ' \
              | head -n 1)

            if [ -n "$DEPLOY_URL" ]; then
              echo "Aliasing $DEPLOY_URL → artimagehub.com"
              vercel alias set "$DEPLOY_URL" artimagehub.com \
                --scope "$VERCEL_ORG_ID" \
                --token "$VERCEL_TOKEN"
              exit 0
            fi

            echo "No Ready production deploy for this commit yet (attempt $i/80), waiting 15s..."
            sleep 15
          done

          echo "::error title=Timeout::No Ready production deploy for ${GITHUB_SHA} found in 20 min"
          exit 1
